name: Deploy Website via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari GitHub
        uses: actions/checkout@v4

      - name: Jalankan FTP Upload
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 5
          set net:reconnect-interval-base 10
          set net:reconnect-interval-max 60
          mkdir -p /public_html/deploypengumuman
          mirror --reverse --verbose --delete \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .ftp-deploy-sync-state.json \
            ./ /public_html/deploypengumuman/
          bye
          EOF
