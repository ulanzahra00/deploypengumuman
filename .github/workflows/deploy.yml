name: Deploy Website ke Hosting Arenhost
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy Project
    runs-on: ubuntu-latest
    steps:
    - name: Ambil kode terbaru dari GitHub
      uses: actions/checkout@v4 # Diperbarui ke versi terbaru

    - name: Upload via FTP ke cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Diperbarui ke versi paling stabil
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }} # Menggunakan port dari secret Anda
        server-dir: ./pengumumanfix/
        security: "strict" # PENTING: Memaksa menggunakan koneksi FTPS aman agar tidak timeout