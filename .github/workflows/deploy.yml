name: Deploy Website ke Hosting Arenhost
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy Project
    runs-on: ubuntu-latest
    steps:
    - name: Ambil kode terbaru dari GitHub
      uses: actions/checkout@v4

    - name: Upload via FTP ke cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        # DIBAWAH INI SUDAH DIPERBAIKI (Tanpa tanda titik di depan)
        server-dir: /public_html/deploypengumuman/
        log-level: verbose
        dangerous-clean-slate: false
        exclude: |
          **/*.zip
          **/*.rar
          .git*
          .git*/**