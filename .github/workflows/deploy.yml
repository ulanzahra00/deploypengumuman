name: Deploy Website via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari GitHub
        uses: actions/checkout@v4

      - name: Jalankan FTP Upload
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Deploying to FTP server: $FTP_SERVER"
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftpes://$FTP_SERVER" <<EOF
          debug 3
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set net:timeout 60
          set net:max-retries 10
          set net:reconnect-interval-base 10
          set net:reconnect-interval-max 60
          set xfer:clobber yes
          mkdir -p /public_html/deploypengumuman
          mirror --reverse --verbose --delete --continue --parallel=1 \
            --exclude-glob=.git/ \
            --exclude-glob=.github/ \
            --exclude-glob=.sixth/ \
            --exclude-glob=pengumuman.zip \
            --exclude-glob=.ftp-deploy-sync-state.json \
            ./ /public_html/deploypengumuman/
          bye
          EOF
